<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RitLog — Inloggen</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;">

<div style="width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:32px;">
        <div style="width:56px;height:56px;background:var(--oranje);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        </div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--blauw);">RitLog</div>
        <div style="font-size:14px;color:var(--tekst-zacht);margin-top:4px;">Log in om verder te gaan</div>
    </div>

    {% with berichten = get_flashed_messages(with_categories=true) %}
    {% if berichten %}
    {% for categorie, bericht in berichten %}
    <div style="padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:14px;font-weight:500;
    background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2;">
        {{ bericht }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="card">
        <div class="card-body">
            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Gebruikersnaam</label>
                    <input type="text" name="gebruikersnaam" placeholder="Jouw gebruikersnaam" required autofocus>
                </div>
                <div class="form-group">
                    <label>Wachtwoord</label>
                    <input type="password" name="wachtwoord" placeholder="Jouw wachtwoord" required>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:8px;">Inloggen</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
