<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritoverzicht</title>
</head>
<body>
    <h1>Ritoverzicht</h1>
    <a href="/rit">Nieuwe rit</a> | <a href="/beheer">Beheer</a>
    <hr>
    <table border="1" cellpadding="8">
        <tr>
            <th>Datum</th>
            <th>Chauffeur</th>
            <th>Truck</th>
            <th>Oplegger</th>
            <th>Start</th>
            <th>Eind</th>
            <th>Pauze</th>
            <th>Filialen</th>
            <th>Opmerkingen</th>
        </tr>
        {% for r in ritten %}
        <tr>
            <td>{{ r[4] }}</td>
            <td>{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
            <td>{{ r[3] }}</td>
            <td>{{ r[5] }}</td>
            <td>{{ r[6] }}</td>
            <td>{{ r[8] }} min</td>
            <td>{{ filialen_per_rit[r[0]] | join(" → ") }}</td>
            <td>{{ r[7] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
